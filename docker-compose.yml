services:
  db:
    image: postgres:16
    container_name: encomiendas_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clave123
      POSTGRES_DB: encomiendas_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: encomiendas_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata: